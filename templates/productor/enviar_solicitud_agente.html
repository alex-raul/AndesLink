{% extends 'base.html' %}
{% block title %}Enviar solicitud — AndesLink{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-8">
  <a href="{% url 'productor:buscar_agentes' %}"
     class="text-sm text-andes-700 hover:underline mb-4 inline-block">← Volver</a>

  <div class="bg-white rounded-2xl border border-gray-200 p-6">
    <div class="flex items-center gap-4 mb-5 pb-4 border-b border-gray-100">
      {% if agente.foto %}
        <img src="{{ agente.foto.url }}"
             class="w-14 h-14 rounded-full object-cover border-2 border-yellow-200">
      {% else %}
        <div class="w-14 h-14 rounded-full bg-yellow-100 flex items-center justify-center text-2xl">
          🧭
        </div>
      {% endif %}
      <div>
        <p class="font-bold">{{ agente.get_full_name }}</p>
        <p class="text-sm text-gray-500">Agente Andino · {{ agente.departamento }}</p>
      </div>
    </div>

    <h1 class="text-base font-semibold mb-4">Enviar solicitud de relación</h1>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Mensaje (opcional)
        </label>
        <textarea name="mensaje" rows="3"
                  placeholder="Cuéntale dónde estás, qué produces…"
                  class="w-full border border-gray-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-andes-500"></textarea>
      </div>
      <button type="submit"
              class="w-full bg-yellow-500 text-white py-2.5 rounded-xl font-semibold hover:bg-yellow-600 transition">
        Enviar solicitud
      </button>
    </form>
  </div>
</div>
{% endblock %}
