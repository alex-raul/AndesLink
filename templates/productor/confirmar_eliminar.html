{% extends 'base.html' %}
{% block title %}Eliminar producto — AndesLink{% endblock %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-10">
  <div class="bg-white rounded-2xl border border-red-200 p-6 text-center">
    <div class="text-5xl mb-3">🗑️</div>
    <h1 class="text-lg font-bold mb-2">¿Eliminar "{{ producto.nombre }}"?</h1>
    <p class="text-sm text-gray-500 mb-6">Esta acción no se puede deshacer.</p>
    <form method="post" class="flex gap-3 justify-center">
      {% csrf_token %}
      <button type="submit"
              class="bg-red-500 text-white px-6 py-2.5 rounded-xl font-semibold hover:bg-red-700 transition">
        Sí, eliminar
      </button>
      <a href="{% url 'productor:dashboard' %}"
         class="border border-gray-300 text-gray-600 px-6 py-2.5 rounded-xl font-semibold hover:bg-gray-50 transition">
        Cancelar
      </a>
    </form>
  </div>
</div>
{% endblock %}
