{% extends 'base.html' %}
{% block title %}Ingresar — AndesLink{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto px-4 py-10">
  <div class="bg-white rounded-2xl border border-gray-200 p-6">
    <h1 class="text-xl font-bold mb-5">Ingresar a AndesLink</h1>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
        <div class="[&>input]:w-full [&>input]:border [&>input]:border-gray-300 [&>input]:rounded-lg [&>input]:px-3 [&>input]:py-2 [&>input]:text-sm">
          {{ field }}
        </div>
        {% if field.errors %}
          <p class="text-xs text-red-600 mt-1">{{ field.errors.0 }}</p>
        {% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="w-full bg-andes-700 text-white py-2.5 rounded-xl font-semibold hover:bg-andes-900 transition">
        Ingresar
      </button>
    </form>
    <p class="text-center text-sm text-gray-500 mt-4">
      ¿No tienes cuenta? <a href="{% url 'accounts:registro' %}" class="text-andes-700 font-medium hover:underline">Regístrate</a>
    </p>
  </div>
</div>
{% endblock %}
