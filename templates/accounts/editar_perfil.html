{% extends 'base.html' %}
{% block title %}Editar perfil — AndesLink{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-8">
  <a href="{% url 'accounts:perfil' %}" class="text-sm text-andes-700 hover:underline mb-4 inline-block">← Volver a mi perfil</a>
  <div class="bg-white rounded-2xl border border-gray-200 p-6">
    <h1 class="text-xl font-bold mb-5">Editar perfil</h1>
    <form method="post" enctype="multipart/form-data" class="space-y-4">
      {% csrf_token %}
      {% for field in form %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
        <div class="[&>input]:w-full [&>input]:border [&>input]:border-gray-300 [&>input]:rounded-lg [&>input]:px-3 [&>input]:py-2 [&>input]:text-sm
                    [&>select]:w-full [&>select]:border [&>select]:border-gray-300 [&>select]:rounded-lg [&>select]:px-3 [&>select]:py-2 [&>select]:text-sm">
          {{ field }}
        </div>
        {% if field.errors %}
          <p class="text-xs text-red-600 mt-1">{{ field.errors.0 }}</p>
        {% endif %}
      </div>
      {% endfor %}
      <button type="submit"
              class="w-full bg-andes-700 text-white py-2.5 rounded-xl font-semibold hover:bg-andes-900 transition">
        Guardar cambios
      </button>
    </form>
  </div>
</div>
{% endblock %}
